<!doctype html>
<html lang="{:html_lang()}">

<head>
  {include file="head" /}
  <title>{:lang('seo.calcdata.title')}</title>
  <meta name="keywords" content="{:lang('seo.calcdata.keywords')}" />
  <meta name="description" content="{:lang('seo.calcdata.description')}" />
</head>

<body>
  {include file="header" /}
  <div class="container">
    <div class="row">
      <div class="col-md-12 col10main">
        <div class="accordion" id="accordion2">
          <div class="accordion-group">
            <!-- <div><a href="https://www.aliyun.com/minisite/goods?userCode=eaborev5" target="_blank" rel="nofollow"><img src="http://zxgj.16400.cn/static/images/ali.jpg"></a></div> -->
            {include file="tools_tabs_calculate" /}
            <div class="panel">
              <div class="form-inline" style="width: 98%; text-align: center">
                <div class="form-group">
                  <ul class="DataStoreCountCent" style="text-align: right">
                    <li>
                      <label>
                        <span>比特</span><span class="mathunit">（bit）</span></label><input type="text" id="bitTxt"
                        class="form-control filesizetxt" onkeyup="
                            this.value = this.value.replace(/[^0-9.]/g, '')
                          " onafterpaste="this.value=this.value.replace(/[^0-9.]/g,'')" placeholder="请输入数字"
                        aria-describedby="basic-addon2" />
                    </li>
                    <li>
                      <label>
                        <span>字节</span><span class="mathunit">（Bytes）</span></label><input type="text" id="bytesTxt"
                        class="form-control filesizetxt" onkeyup="
                            this.value = this.value.replace(/[^0-9.]/g, '')
                          " onafterpaste="this.value=this.value.replace(/[^0-9.]/g,'')" placeholder="请输入数字"
                        aria-describedby="basic-addon2" />
                    </li>
                    <li>
                      <label>
                        <span>千字节</span><span class="mathunit">（KB）</span></label>
                      <input type="text" id="kbTxt" class="form-control filesizetxt" onkeyup="
                            this.value = this.value.replace(/[^0-9.]/g, '')
                          " onafterpaste="this.value=this.value.replace(/[^0-9.]/g,'')" placeholder="请输入数字"
                        aria-describedby="basic-addon2" />
                    </li>
                    <li>
                      <label>
                        <span>兆字节</span><span class="mathunit">（MB）</span></label><input type="text" id="mbTxt"
                        class="form-control filesizetxt" onkeyup="
                            this.value = this.value.replace(/[^0-9.]/g, '')
                          " onafterpaste="this.value=this.value.replace(/[^0-9.]/g,'')" placeholder="请输入数字"
                        aria-describedby="basic-addon2" />
                    </li>
                    <li>
                      <label>
                        <span>千兆字节</span><span class="mathunit">（GB）</span></label><input type="text" id="gbTxt"
                        class="form-control filesizetxt" onkeyup="
                            this.value = this.value.replace(/[^0-9.]/g, '')
                          " onafterpaste="this.value=this.value.replace(/[^0-9.]/g,'')" placeholder="请输入数字"
                        aria-describedby="basic-addon2" />
                    </li>
                    <li>
                      <label>
                        <span>太字节</span><span class="mathunit">（TB）</span></label><input type="text" id="tbTxt"
                        class="form-control filesizetxt" onkeyup="
                            this.value = this.value.replace(/[^0-9.]/g, '')
                          " onafterpaste="this.value=this.value.replace(/[^0-9.]/g,'')" placeholder="请输入数字"
                        aria-describedby="basic-addon2" />
                    </li>
                  </ul>
                  <hr />
                  <input type="button" id="reset" class="btn btn-warning" value="全部重置" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="alert alert-success alert-dismissible">
      <h4>在线数据大小换算器介绍</h4>
      <p>
        比特、字节、千兆字节、千字节、拍字节、兆字节、太字节(bit,bytes,KB,MB,GB,TB)的数据存储单位转换
      </p>
    </div>
    <div class="accordion-group"></div>
  </div>
  {include file="script" /}
  <script src="/static/script/pcjs/dataexchage.js" type="text/javascript"></script>
  {include file="nav" /}
  {include file="link" /}
  {include file="footer" /}
</body>

</html>
