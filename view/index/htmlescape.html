<!doctype html>
<html lang="{:html_lang()}">

<head>
  {include file="head" /}
  <title>{:lang('seo.htmlescape.title')}</title>
  <meta name="keywords" content="{:lang('seo.htmlescape.keywords')}" />
  <meta name="description" content="{:lang('seo.htmlescape.description')}" />
</head>

<body>
  {include file="header" /}
  <div class="container">
    <div class="row">
      <div class="col-md-12 col10main">
        <div class="accordion" id="accordion2">
          <div class="accordion-group">
            <!-- <div><a href="https://www.aliyun.com/minisite/goods?userCode=eaborev5" target="_blank" rel="nofollow"><img src="http://zxgj.16400.cn/static/images/ali.jpg"></a></div> -->
            {include file="tools_tabs_format" /}
            <div class="panel">
              <form id="form1" class="form-horizontal" method="post">
                <div class="form-group">
                  <div class="col-sm-12">
                    <textarea class="form-control" id="content" name="content" rows="10"
                      placeholder="请在输入框粘贴需转换的HTML代码"></textarea>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-sm-12 text-center">
                    <input type="button" id="btn1" value="HTML转义" class="btn btn-success" /><input type="button"
                      id="btn2" value="HTML反转义" class="btn btn-info" /><span id="copyallcode" class="btn btn-default"
                      data-clipboard-target="#result">复制</span><button type="button" class="btn btn-default"
                      onclick="ClearAll()">
                      清空</button><a class="btn btn-warning" href="/formathtml/" target="_blank">Html格式化</a>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-sm-12">
                    <pre><code id="result"></code></pre>
                  </div>
                </div>
              </form>
            </div>
          </div>
          <div class="alert alert alert-success alert-dismissible">
            <h4>html在线转义工具</h4>
            <p>
              HTML转换工具，可以将HTML代码转换为HTML转义字符串,如果您觉得好用，请记得收藏我们的地址。
            </p>
          </div>
          <div class="accordion-group"></div>
        </div>
      </div>
    </div>
  </div>
  {include file="script" /}
  <script src="/static/script/hightout.js"></script>
  <script src="/static/script/pcjs/htmlescape.js"></script>
    {include file="nav" /}
  {include file="link" /}
  {include file="footer" /}
</body>

</html>
