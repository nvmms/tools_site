<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>管理员登陆</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/admin/css/login.css">
    <script src="/static/js/jquery-3.3.1.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <style>
        .login {
            width: 400px;
        }
    </style>
</head>

<body id="login">
<div class="login">
    <h2>管理员登录</h2>
    <form class="layui-form" method="post" action="">
        <div class="layui-form-item">
            <label class="layui-form-label">用户名</label>
            <div class="layui-input-block">
              <input type="text" name="username" id="username" required  lay-verify="required" placeholder="请输入用户名" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">密码</label>
            <div class="layui-input-block">
              <input type="password" name="password" id="password" required  lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <div class="layui-input-block">
              <button class="layui-btn" lay-filter="formLogin" onclick="login()">登录</button>
            </div>
          </div>
          
    </form>

    <script>

    function login() {
        $.ajax({
                url: 'index/login',
                type: "post",
                data:{
                    'username':$('#username').val(),
                    'password':$('#username').val()
                },
                dataType:'json',
                error:function(){
                    //layer.msg('无法访问数据库，请检查你的数据库配置',function(){})
                },
                success:function(data){
                    //后台重定向跳转
                        // console.log('data', data);
                        // if (data.code == 1) {
                        //     layer.msg(data.msg);
                        //     location.href = './index.html';
                        // } else {
                        //     layer.msg(data.msg);
                        // }
                }
            });
    } 

    </script>
</div>
</body>

</html>
