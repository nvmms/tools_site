<!doctype html>
<html lang="zh-CN">

<head>
  {include file="head" /}
  <title>{$Think.config.web.checkweixin.title}</title>
  <meta name="keywords" content="{$Think.config.web.checkweixin.keywords}" />
  <meta name="description" content="{$Think.config.web.checkweixin.description}" />
</head>

<body>
  {include file="header" /}
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="accordion" id="accordion2">
          <div class="accordion-group">
            {include file="tools_tabs_webmaster" /}
            <div class="panel">
              <form id="form1help" class="form-horizontal">
                <div class="form-group">
                  <div class="col-sm-9">
                    <input class="form-control" id="txt_url" name="txt_url" type="text" value=""
                      placeholder="输入要查询的域名，如：http://{$_SERVER.HTTP_HOST}" />
                  </div>

                  <div class="col-sm-3">
                    <button type="button" class="btn btn-success" id="chameta" onclick="check_meta()">
                      立即检测
                    </button>
                  </div>
                </div>
              </form>
              <div id="metachecktb">
                <table class="table table-bordered table-striped">
                  <thead>
                    <tr>
                      <th class="titcolor">检测域名</th>
                      <th class="titcolor">微信域名检测结果</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>
                        <span id="check_url">请在上面地址栏中，输入您要做微信检测的域名</span>
                      </td>
                      <td>
                        <span id="check_result"></span>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="alert alert alert-success alert-dismissible">
            <h4>微信域名检测工具</h4>
            <p>
              使用微信域名检测工具可以实时检测域名是否被微信屏蔽，检测您的域名在微信是否被拦截等
              。
            </p>
          </div>
          <div class="accordion-group"></div>
        </div>
      </div>
    </div>
  </div>
  {include file="script" /}
  <script>
    function check_meta() {
      $("#chameta").text("正在检测，请稍候……");
      $("#check_result").text("正在检测，请稍候……");
      var txt_url = $("#txt_url").val();
      $("#check_url").html("<strong>" + txt_url + "</strong>");
      $.post(
        "/api/",
        { txt_url: txt_url, type: "checkweixin" },
        function (datas) {
          if (datas.status == 1) {
            if (datas.code == 1) {
              $("#check_result").html(
                "<img src='/static/images/error.png'> <font color='red'>" +
                datas.msg +
                "</font>",
              );
            } else {
              $("#check_result").html(
                "<img src='/static/images/ok.png'> <font color='green'>" +
                datas.msg +
                "</font>",
              );
            }
          } else {
            pcjson_com_msg($("#txt_url"), datas.msg);
          }
          $("#chameta").text("立即检测");
        },
      );
    }
  </script>
  {include file="nav" /} {include file="footer" /}
</body>

</html>
