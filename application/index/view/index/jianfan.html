<!doctype html>
<html lang="zh-CN">

<head>
  {include file="head" /}
  <title>{$Think.config.web.jianfan.title}</title>
  <meta name="keywords" content="{$Think.config.web.jianfan.keywords}" />
  <meta name="description" content="{$Think.config.web.jianfan.description}" />
</head>

<body>
  {include file="header" /}
  <div class="container">
    <div class="row">
      <div class="col-md-12 col10main">
        <div class="accordion" id="accordion2">
          <div class="accordion-group">
            <!-- <div><a href="https://www.aliyun.com/minisite/goods?userCode=eaborev5" target="_blank" rel="nofollow"><img src="http://zxgj.16400.cn/static/images/ali.jpg"></a></div> -->
            {include file="tools_tabs_text" /}
            <div class="panel">
              <form id="mform" class="form-horizontal" method="post">
                <div class="form-group">
                  <div class="col-sm-12">
                    <textarea onmouseover="this.focus()" id="content" name="content" class="form-control" rows="10"
                      placeholder="请输入要转换的文字"></textarea>
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-sm-12 text-center">
                    <button type="button" class="btn btn-success" onclick="convert(0)">
                      转为简体</button><button type="button" class="btn btn-info" onclick="convert(1)">
                      转为繁体</button><span id="copyallcode" class="btn btn-default"
                      data-clipboard-target="#result">复制</span><input type="button" onclick="ClearAll()" value="清空"
                      class="btn btn-default" />
                  </div>
                </div>
                <div class="form-group">
                  <div class="col-sm-12">
                    <pre><code id="result"></code></pre>
                  </div>
                </div>
              </form>
            </div>
          </div>
          <div class="alert alert alert-success alert-dismissible">
            <h4>简繁体互转工具</h4>
            <p>
              实现简体字转换为繁体字,繁体字转换为简体字,繁体转简体,简繁互转换。
            </p>
          </div>
          <div class="accordion-group"></div>
        </div>
      </div>
    </div>
  </div>
  {include file="script" /}
  <script src="/static/script/pcjs/jianfan.js"></script>
  <script src="/static/script/hightout.js"></script>
    {include file="nav" /}
  {include file="link" /}
  {include file="footer" /}
</body>

</html>
