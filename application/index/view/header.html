<div class="navbar navbar-default navbar-static-top navbar-fixed-top">
  <div class="jz container">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar"
        aria-expanded="false" aria-controls="navbar">
        <span class="sr-only">站长工具</span>
        <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="/" title="站长工具">
        <em class="logo_ico glyphicon glyphicon-wrench"></em>站长工具
      </a>
    </div>
    <div id="navbar" class="navbar-collapse collapse" role="navigation">
      <ul class="nav navbar-nav" id="top_menu">
        {foreach $Think.config.web.tools as $group}
        <li class="dropdown">
          <a href="/" class="dropdown-toggle" data-toggle="dropdown" role="button" aria-haspopup="true"
            aria-expanded="false">{$group.label}<span class="caret"></span></a>
          <ul class="dropdown-menu ul-list">
            {foreach $group.items as $tool}
            <li>
              <a href="/{$tool.path}/"{if isset($tool.style)} style="{$tool.style}"{/if}>{$tool.label}</a>
            </li>
            {/foreach}
          </ul>
        </li>
        {/foreach}
      </ul>
    </div>
  </div>
</div>
